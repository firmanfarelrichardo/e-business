server {
    listen 80;
    
    # Isi dengan URL Public Domain / IP Utama Web-nya
    server_name _;
    
    root /var/www/public;
    index index.php index.html index.htm;

    # ========================================================
    # SECURITY HEADERS
    # Proteksi fundamental untuk mengamankan Web dari Attack
    # ========================================================
    add_header X-Frame-Options "SAMEORIGIN";          # Clickjacking protection
    add_header X-XSS-Protection "1; mode=block";      # Cross-site scripting guard
    add_header X-Content-Type-Options "nosniff";      # MIME-Sniffing protection
    add_header Referrer-Policy "strict-origin-when-cross-origin"; 
    # Aturan dasar content-security-policy (Dapat disesuaikan jika midtrans integrasi perlu cross domain iFrame)
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'";

    # ========================================================
    # OPTIMALISASI SERVER RESOURCES / KOMPRESI
    # ========================================================
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # Logic default routing SPA/Laravel
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Hide Error logs untuk files robots maupun favicons yang di fetch oleh crawler
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Ekstrak cache statis dengan durasi maximum (Akan mengurangi response time pada UI)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        access_log off;
    }

    # Interception untuk execute kode PHP
    location ~ \.php$ {
        # Mengunci FPM Pass pada container App port 9000
        fastcgi_pass app:9000;
        
        # Resolve issue symbolic link mapping oleh server
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Sembunyikan identity header internal agar aman dari scanning versions
        fastcgi_hide_header X-Powered-By;
    }

    # Deny absolut file tersembunyi yang berisiko bila terlempar ke luar!
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
